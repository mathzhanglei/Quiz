name: Supabase Keepalive

on:
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase
        run: |
          node <<'NODE'
          global.window = {};
          require("./questions.js");

          const settings = window.QUIZ_CONFIG?.settings || {};
          const supabaseUrl = String(settings.supabaseUrl || "")
            .trim()
            .replace(/\/+$/, "")
            .replace(/\/rest\/v1$/i, "");
          const supabaseAnonKey = String(settings.supabaseAnonKey || "").trim();

          if (!supabaseUrl || !supabaseAnonKey) {
            throw new Error("questions.js is missing supabaseUrl or supabaseAnonKey.");
          }

          (async () => {
            const response = await fetch(`${supabaseUrl}/rest/v1/rpc/quiz_ping`, {
              method: "POST",
              headers: {
                apikey: supabaseAnonKey,
                Authorization: `Bearer ${supabaseAnonKey}`,
                "Content-Type": "application/json"
              },
              body: "{}"
            });

            const text = await response.text();
            if (!response.ok) {
              throw new Error(`Supabase ping failed: HTTP ${response.status} ${text}`);
            }

            console.log(text || "Supabase ping ok");
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
